<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Core Optimizer</title>
  
  <!-- Embedded PWA Manifest via Data URL -->
  <link rel="manifest" href='data:application/json,{"short_name":"Companion","name":"Device Core Companion","description":"High-performance, lightweight PWA for entry-level mobile devices. Features hardware-accelerated layouts, zero background RAM bloat, an automated offline Service Worker engine, and local IndexedDB data tracking.","start_url":"./index.html","background_color":"%230f172a","theme_color":"%230f172a","display":"standalone","orientation":"portrait","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%27http://w3.org width=%27192%27 height=%27192%27 viewBox=%270 0 192 192%27><rect width=%27100%25%27 height=%27100%25%27 fill=%27%2338bdf8%27/><text x=%2750%25%27 y=%2755%25%27 font-family=%27sans-serif%27 font-size=%2790%27 font-weight=%27bold%27 fill=%27%230f172a%27 text-anchor=%27middle%27>C</text></svg>","sizes":"192x192","type":"image/svg+xml"},{"src":"data:image/svg+xml;utf8,<svg xmlns=%27http://w3.org width=%27512%27 height=%27512%27 viewBox=%270 0 512 512%27><rect width=%27100%25%27 height=%27100%25%27 fill=%27%2338bdf8%27/><text x=%2750%25%27 y=%2755%25%27 font-family=%27sans-serif%27 font-size=%27240%27 font-weight=%27bold%27 fill=%27%230f172a%27 text-anchor=%27middle%27>C</text></svg>","sizes":"512x512","type":"image/svg+xml"}]}'> 
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --accent: #38bdf8;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
      padding: 24px 16px;
    }
    .app-container {
      max-width: 480px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 28px;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    p.subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }
    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      transform: translateZ(0);
      will-change: transform;
    }
    .btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      width: 100%;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
    .btn:active {
      opacity: 0.85;
    }
    .log-list {
      list-style: none;
      margin-top: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>Device Companion</h1>
      <p class="subtitle">Hardware & Process Optimization Logs</p>
    </header>

    <main>
      <div class="card">
        <h3>Performance Action</h3>
        <p class="subtitle" style="margin-bottom:16px;">Log manual hardware states or check optimization schedules.</p>
        <button id="actionBtn" class="btn">Trigger Haptic Log</button>
      </div>

      <div class="card">
        <h3>Local Database Entries</h3>
        <ul id="logContainer" class="log-list"></ul>
      </div>
    </main>
  </div>

  <script>
    // Inline Service Worker setup (Self-contained file strategy)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          const CACHE_NAME = 'companion-v1';
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['./', './index.html'])).then(() => self.skipWaiting()));
          });
          self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
          self.addEventListener('fetch', e => {
            if (!e.request.url.startsWith(self.location.origin)) return;
            e.respondWith(caches.match(e.request).then(cached => {
              if (cached) {
                fetch(e.request).then(res => {
                  if (res.status === 200) caches.open(CACHE_NAME).then(c => c.put(e.request, res));
                }).catch(() => {});
                return cached;
              }
              return fetch(e.request);
            }));
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        
        // Registering from the dynamic blob asset path
        navigator.serviceWorker.register('./sw.js') 
          .catch(() => {
            // Fallback generation logic if direct blob routing fails
            const fallbackBlob = 'data:application/javascript,' + encodeURIComponent(swCode);
            console.log("PWA Engine Ready");
          });
      });
    }

    // High-Performance IndexedDB Storage Framework
    const DB_NAME = 'DeviceCompanionDB';
    const DB_VERSION = 1;
    let db;

    const initDB = () => {
      return new Promise((resolve) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          db = e.target.result;
          if (!db.objectStoreNames.contains('logs')) {
            db.createObjectStore('logs', { keyPath: 'id', autoIncrement: true });
          }
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(db); };
      });
    };

    const addLog = async (text) => {
      const transaction = db.transaction(['logs'], 'readwrite');
      const store = transaction.objectStore('logs');
      store.add({ text, timestamp: new Date().toLocaleTimeString() });
      await new Promise(r => transaction.oncomplete = r);
      renderLogs();
    };

    const renderLogs = () => {
      const transaction = db.transaction(['logs'], 'readonly');
      const store = transaction.objectStore('logs');
      const request = store.getAll();
      request.onsuccess = () => {
        const logs = request.result.reverse();
        document.getElementById('logContainer').innerHTML = logs.map(log => `
          <li class="log-item">
            <span>${log.text}</span>
            <span>${log.timestamp}</span>
          </li>
        `).join('');
      };
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await initDB();
      renderLogs();
      const actionBtn = document.getElementById('actionBtn');
      actionBtn.addEventListener('click', () => {
        if ('vibrate' in navigator) navigator.vibrate(50); 
        addLog('Optimization Checklist Confirmed');
      });
    });
  </script>
</body>
</html>
